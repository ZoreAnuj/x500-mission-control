<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>X500 Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F172A; --muted:#1F1E27; --fg:#FFFFFF; --dim:#94A3B8;
    --border:rgba(255,255,255,.08); --primary:#D97706; --accent:#6366F1;
    --ok:#22C55E; --warn:#F59E0B; --bad:#DC2626;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:'Fira Sans',sans-serif;
    -webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .mono{font-family:'Fira Code',monospace;font-variant-numeric:tabular-nums}
  /* status bar */
  #statusbar{display:flex;gap:24px;align-items:center;padding:10px 18px;
    background:var(--muted);border-bottom:1px solid var(--border);font-size:14px;flex-wrap:wrap;
    position:relative;z-index:101}
  .stat{display:flex;gap:7px;align-items:center}
  .stat .lbl{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--bad)}
  .dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .pill{padding:2px 10px;border-radius:5px;font-weight:600;font-size:13px;letter-spacing:.04em}
  .pill.armed{background:var(--bad);color:#fff;animation:pulse 1.4s infinite}
  .pill.disarmed{background:#334155;color:var(--dim)}
  .linkbtns{margin-left:auto;display:flex;gap:8px}
  .sbtn{font-family:'Fira Sans';font-size:12px;font-weight:600;border:1px solid var(--border);
    background:#1E293B;color:var(--fg);padding:7px 13px;border-radius:6px;cursor:pointer;transition:background .15s}
  .sbtn:hover{background:#293548}
  #connect{border-color:var(--accent);color:#c7d2fe}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  /* main */
  #main{flex:1;display:grid;grid-template-columns:1fr 360px;gap:1px;min-height:0;background:var(--border)}
  .panel{background:var(--bg);padding:18px;overflow:auto}
  h2{font-family:'Fira Code',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.12em;
    color:var(--dim);margin:0 0 14px;font-weight:600}
  /* readouts */
  .readouts{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
  .ro .lbl{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .ro .val{font-size:26px;font-weight:600}
  .ro .val small{font-size:13px;color:var(--dim);font-weight:400}
  .val.bad{color:var(--bad)} .val.warn{color:var(--warn)} .val.ok{color:var(--ok)}
  /* attitude */
  #adi{width:280px;height:280px;display:block;margin:6px auto}
  /* statustext */
  #log{font-family:'Fira Code',monospace;font-size:12px;line-height:1.6;
    background:#0a1120;border:1px solid var(--border);border-radius:6px;padding:10px;height:140px;overflow:auto}
  #log .ln{color:#CBD5E1;white-space:nowrap}
  #log .ln b{color:var(--warn)}
  /* controls */
  #controls{display:flex;gap:14px;align-items:center;padding:16px 18px;
    background:var(--muted);border-top:1px solid var(--border);flex-wrap:wrap}
  button{font-family:'Fira Sans';font-size:14px;font-weight:600;border:1px solid var(--border);
    background:#1E293B;color:var(--fg);padding:11px 18px;border-radius:7px;cursor:pointer;
    transition:background .15s,opacity .15s}
  button:hover:not(:disabled){background:#293548}
  button:disabled{opacity:.38;cursor:not-allowed}
  button.go{background:var(--accent);border-color:var(--accent)}
  .ctl{display:flex;flex-direction:column;gap:4px}
  .ctl .hint{font-size:10px;color:var(--dim);text-align:center}
  input[type=number]{width:64px;font-family:'Fira Code';background:#0a1120;color:#fff;
    border:1px solid var(--border);border-radius:6px;padding:9px;font-size:14px}
  /* slide to arm */
  .slider{position:relative;width:190px;height:44px;background:#0a1120;border:1px solid var(--border);
    border-radius:8px;overflow:hidden;cursor:pointer}
  .slider .fill{position:absolute;inset:0;width:0;background:var(--ok);opacity:.25}
  .slider .txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;letter-spacing:.06em;pointer-events:none;color:var(--dim)}
  .slider input{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:grab}
  /* kill */
  #kill{position:relative;margin-left:auto;width:200px;height:60px;border-radius:9px;
    background:#2a0a0a;border:2px solid var(--bad);color:var(--bad);font-size:15px;font-weight:700;
    letter-spacing:.08em;cursor:pointer;overflow:hidden;user-select:none}
  #kill .kfill{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--bad);opacity:.9}
  #kill .ktxt{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;height:100%}
  #kill.active .ktxt{color:#fff}
  /* link lost */
  #lost{position:fixed;inset:0;background:rgba(120,0,0,.82);display:none;align-items:center;
    justify-content:center;flex-direction:column;z-index:100;font-weight:700;pointer-events:none}
  #lost.show{display:flex}
  #lost .big{font-size:42px;letter-spacing:.1em;font-family:'Fira Code'}
  #lost .sub{font-size:15px;margin-top:10px;font-weight:400}
</style>
</head>
<body>
  <div id="statusbar">
    <div class="stat"><span class="dot" id="linkdot"></span><span id="link" class="mono">LINK…</span></div>
    <div class="stat"><span class="lbl">Mode</span><b id="mode" class="mono">—</b></div>
    <div class="stat"><span class="pill disarmed" id="armpill">DISARMED</span></div>
    <div class="stat"><span class="lbl">GPS</span><span id="gps" class="mono">—</span></div>
    <div class="stat"><span class="lbl">Batt</span><span id="batt" class="mono">—</span></div>
    <div class="linkbtns">
      <button class="sbtn" id="connect">Connect</button>
      <button class="sbtn" id="disconnect">Disconnect</button>
      <button class="sbtn" id="refresh">Refresh</button>
    </div>
  </div>

  <div id="main">
    <div class="panel">
      <h2>Telemetry</h2>
      <div class="readouts">
        <div class="ro"><div class="lbl">Latitude</div><div class="val mono" id="lat">—</div></div>
        <div class="ro"><div class="lbl">Longitude</div><div class="val mono" id="lon">—</div></div>
        <div class="ro"><div class="lbl">Altitude (rel)</div><div class="val mono" id="alt">—<small> m</small></div></div>
        <div class="ro"><div class="lbl">Ground speed</div><div class="val mono" id="gspd">—<small> m/s</small></div></div>
        <div class="ro"><div class="lbl">Heading</div><div class="val mono" id="hdg">—<small>°</small></div></div>
        <div class="ro"><div class="lbl">Throttle</div><div class="val mono" id="thr">—<small>%</small></div></div>
      </div>
      <h2 style="margin-top:24px">Messages</h2>
      <div id="log"></div>
    </div>

    <div class="panel" style="display:flex;flex-direction:column;align-items:center">
      <h2 style="align-self:flex-start">Attitude</h2>
      <svg id="adi" viewBox="0 0 200 200">
        <defs><clipPath id="cir"><circle cx="100" cy="100" r="88"/></clipPath></defs>
        <g clip-path="url(#cir)">
          <g id="horizon">
            <rect x="-300" y="-300" width="800" height="400" fill="#1e4976"/>
            <rect x="-300" y="100" width="800" height="500" fill="#5b4326"/>
            <line x1="-300" y1="100" x2="500" y2="100" stroke="#fff" stroke-width="1.5"/>
            <g stroke="#fff" stroke-width="1" font-family="Fira Code" font-size="7" fill="#fff">
              <line x1="80" y1="80" x2="120" y2="80"/><line x1="86" y1="60" x2="114" y2="60"/>
              <line x1="80" y1="120" x2="120" y2="120"/><line x1="86" y1="140" x2="114" y2="140"/>
            </g>
          </g>
        </g>
        <circle cx="100" cy="100" r="88" fill="none" stroke="#334155" stroke-width="3"/>
        <line x1="62" y1="100" x2="84" y2="100" stroke="#F59E0B" stroke-width="3"/>
        <line x1="116" y1="100" x2="138" y2="100" stroke="#F59E0B" stroke-width="3"/>
        <circle cx="100" cy="100" r="3" fill="#F59E0B"/>
        <polygon points="100,16 95,26 105,26" fill="#F59E0B" id="rollptr"/>
      </svg>
      <div class="mono" id="rp" style="color:var(--dim);font-size:12px">R 0°  P 0°</div>
    </div>
  </div>

  <div id="controls">
    <button id="guided">Set GUIDED</button>
    <div class="ctl">
      <div class="slider" id="armslide"><div class="fill"></div>
        <div class="txt" id="armtxt">▶ SLIDE TO ARM</div>
        <input type="range" min="0" max="100" value="0" id="armrange"></div>
    </div>
    <div class="ctl">
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" id="alt_in" value="0.5" step="0.1" min="0.2" max="0.5">
        <button id="takeoff" class="go">TAKEOFF</button>
      </div>
      <div class="hint" id="tohint">needs ARMED + GUIDED + 3D fix</div>
    </div>
    <button id="land">LAND</button>
    <button id="rtl">RTL</button>
    <div id="kill"><div class="kfill"></div><div class="ktxt">⬣ HOLD TO KILL</div></div>
  </div>

  <div id="lost"><div class="big">LINK LOST</div><div class="sub">No heartbeat — the kill command may not reach the vehicle.</div></div>

<script>
const $=id=>document.getElementById(id);
let ws, st={};

function connect(){
  ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage=e=>{const d=JSON.parse(e.data); if(d.ack){onAck(d.ack);return;} st=d; render(d);};
  ws.onclose=()=>{$('link').textContent='RECONNECT…';$('linkdot').classList.remove('on');setTimeout(connect,1000);};
}
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function onAck(a){ if(a&&a.ok===false) flashLog('⚠ '+(a.msg||a.cmd)); }

function render(d){
  // link
  $('linkdot').classList.toggle('on',d.link);
  $('link').textContent=d.link?'LINK OK':'LINK LOST';
  $('lost').classList.toggle('show',!d.link);
  // mode + arm
  $('mode').textContent=d.mode;
  const ap=$('armpill');
  ap.textContent=d.armed?'ARMED':'DISARMED';
  ap.className='pill '+(d.armed?'armed':'disarmed');
  // gps
  const fixN={0:'NO',1:'NO',2:'2D',3:'3D',4:'DGPS',5:'RTKf',6:'RTKx'}[d.fix]||d.fix;
  const g=$('gps'); g.textContent=`${fixN} ${d.sats}sat ${d.hdop.toFixed(1)}`;
  g.className='mono '+(d.fix>=3?'':'');
  g.style.color=d.fix>=3?'var(--ok)':'var(--bad)';
  // batt
  const b=$('batt'); const pct=d.batt_pct>=0?` ${d.batt_pct}%`:'';
  b.textContent=`${d.volt.toFixed(1)}V${pct}`;
  b.style.color=(d.batt_pct>=0&&d.batt_pct<20)?'var(--bad)':(d.volt<14?'var(--warn)':'var(--fg)');
  // readouts
  $('lat').textContent=d.lat!=null?d.lat.toFixed(6):'—';
  $('lon').textContent=d.lon!=null?d.lon.toFixed(6):'—';
  $('alt').innerHTML=d.rel_alt.toFixed(2)+'<small> m</small>';
  $('gspd').innerHTML=d.gspd.toFixed(1)+'<small> m/s</small>';
  $('hdg').innerHTML=Math.round(d.hdg)+'<small>°</small>';
  $('thr').innerHTML=d.throttle+'<small>%</small>';
  // attitude
  $('horizon').setAttribute('transform',`rotate(${-d.roll} 100 100) translate(0 ${d.pitch*2})`);
  $('rollptr').setAttribute('transform',`rotate(${d.roll} 100 100)`);
  $('rp').textContent=`R ${d.roll.toFixed(0)}°  P ${d.pitch.toFixed(0)}°`;
  // takeoff gating
  const ready=d.armed && d.mode==='GUIDED' && d.fix>=3;
  $('takeoff').disabled=!ready;
  $('tohint').textContent=ready?'ready':'needs ARMED + GUIDED + 3D fix';
  // log
  renderLog(d.statustext||[]);
}

let lastLog=0;
function renderLog(arr){
  if(arr.length && arr[arr.length-1].t===lastLog) return;
  if(arr.length) lastLog=arr[arr.length-1].t;
  $('log').innerHTML=arr.map(m=>{
    const warn=/prearm|fail|error|fence|disarm/i.test(m.text);
    return `<div class="ln">${warn?'<b>':''}${m.text}${warn?'</b>':''}</div>`;
  }).join('');
  $('log').scrollTop=$('log').scrollHeight;
}
function flashLog(t){const d=document.createElement('div');d.className='ln';d.innerHTML='<b>'+t+'</b>';$('log').appendChild(d);}

// ── controls ──
$('connect').onclick=()=>{send({cmd:'connect'});flashLog('↻ connect requested');};
$('disconnect').onclick=()=>{send({cmd:'disconnect'});flashLog('⏏ disconnect requested');};
$('refresh').onclick=()=>{send({cmd:'refresh'});flashLog('↻ stream rates refreshed');};
$('guided').onclick=()=>send({cmd:'set_mode',mode:'GUIDED'});
$('land').onclick=()=>send({cmd:'set_mode',mode:'LAND'});
$('rtl').onclick=()=>send({cmd:'set_mode',mode:'RTL'});
$('takeoff').onclick=()=>{ if(!$('takeoff').disabled) send({cmd:'takeoff',alt:parseFloat($('alt_in').value)}); };

// slide to arm
const ar=$('armrange'), af=document.querySelector('#armslide .fill');
ar.oninput=()=>{ af.style.width=ar.value+'%'; if(+ar.value>=100){ send({cmd:'arm'}); reset(); } };
ar.onchange=reset; ar.onpointerup=reset;
function reset(){ setTimeout(()=>{ar.value=0;af.style.width='0';},150); }

// hold to kill
const kill=$('kill'), kf=kill.querySelector('.kfill');
let kt=null,kstart=0;
function killDown(){ kstart=Date.now(); kill.classList.add('active');
  kt=setInterval(()=>{ const p=Math.min(1,(Date.now()-kstart)/1500); kf.style.width=(p*100)+'%';
    if(p>=1){ killUp(true); } },30); }
function killUp(fire){ clearInterval(kt); kt=null; kill.classList.remove('active'); kf.style.width='0';
  if(fire===true){ send({cmd:'kill'}); flashLog('⬣ KILL SENT'); } }
kill.addEventListener('pointerdown',killDown);
kill.addEventListener('pointerup',()=>killUp(false));
kill.addEventListener('pointerleave',()=>killUp(false));

connect();
</script>
</body>
</html>
